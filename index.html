<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Duck | Design & Identidade</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Montserrat:wght@100;900&display=swap');
    </style>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        duckYellow: '#FFFF00',
                        duckDark: '#050505'
                    },
                    fontFamily: {
                        sans: ['"Inter"', 'sans-serif'],
                        montserrat: ['"Montserrat"', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #050505;
            color: #ffffff;
            overflow-x: hidden;
            /* Esconde o cursor padrão em telas grandes para usarmos a nossa esfera interativa */
            cursor: none; 
        }
        ::selection {
            background-color: #FFFF00;
            color: #000000;
        }
        .manifesto-word { opacity: 0.2; }
        
        /* Ajuste para o cursor customizado não interferir nos cliques */
        #custom-cursor { pointer-events: none; }
        
        /* Traz o cursor padrão de volta em celulares (onde não há mouse real) */
        @media (max-width: 768px) {
            body { cursor: auto; }
            #custom-cursor { display: none; }
        }
    </style>
</head>
<body class="antialiased font-sans">

    <div id="custom-cursor" class="fixed top-0 left-0 w-5 h-5 bg-duckYellow rounded-full z-[100] mix-blend-difference transform -translate-x-1/2 -translate-y-1/2 transition-transform duration-200 ease-out"></div>

    <nav class="fixed top-0 left-0 w-full z-50 transition-all duration-300 backdrop-blur-md bg-black/40 border-b border-white/5 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            
            <a href="#hero" class="flex flex-col items-center justify-center text-white hover:scale-105 transition-transform font-montserrat">
                <span class="text-[0.6rem] font-thin uppercase tracking-[0.4em] leading-none ml-1">Studio</span>
                <span class="text-2xl font-black uppercase tracking-tighter leading-none -mt-1">Duck<span class="text-duckYellow">.</span></span>
            </a>
            
            <div class="hidden md:flex gap-8 items-center">
                <a href="#manifesto" class="text-sm font-bold uppercase tracking-widest text-gray-300 hover:text-duckYellow transition-colors relative group nav-link">
                    Manifesto
                    <span class="absolute -bottom-2 left-0 w-0 h-[2px] bg-duckYellow transition-all duration-300 group-hover:w-full"></span>
                </a>
                <a href="#showcase" class="text-sm font-bold uppercase tracking-widest text-gray-300 hover:text-duckYellow transition-colors relative group nav-link">
                    Projetos
                    <span class="absolute -bottom-2 left-0 w-0 h-[2px] bg-duckYellow transition-all duration-300 group-hover:w-full"></span>
                </a>
                
                <a href="#contato" class="ml-4 bg-white text-black text-sm font-bold uppercase tracking-widest py-2 px-6 rounded-full hover:bg-duckYellow hover:scale-105 transition-all duration-300 shadow-[0_0_15px_rgba(255,255,0,0.0)] hover:shadow-[0_0_20px_rgba(255,255,0,0.4)] nav-link">
                    Start
                </a>
            </div>
        </div>
    </nav>

    <section id="hero" class="relative h-screen flex flex-col items-center justify-center overflow-hidden">
        <div class="absolute inset-0 z-0 opacity-30 bg-[url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&q=80')] bg-cover bg-center"></div>
        <div class="absolute inset-0 bg-gradient-to-b from-transparent to-duckDark z-10"></div>
        
        <div class="z-20 text-center flex flex-col items-center font-montserrat text-white mt-10">
            <h2 class="hero-text text-3xl md:text-5xl font-thin uppercase tracking-[0.5em] leading-none mb-2 ml-4">
                Studio
            </h2>
            <h1 class="hero-text text-8xl md:text-[13rem] font-black uppercase tracking-tighter leading-none -mt-3 md:-mt-8" style="text-shadow: 0px 0px 30px rgba(255,255,0,0.15);">
                Duck
            </h1>
            <p class="hero-text mt-8 text-lg md:text-xl font-sans font-light tracking-[0.3em] text-gray-400 uppercase">
                Design is our weapon.
            </p>
        </div>
        
        <div class="absolute bottom-10 z-20 animate-bounce">
            <p class="text-xs uppercase tracking-[0.3em] text-gray-500 font-sans">Scroll to Dive</p>
        </div>
    </section>

    <section id="manifesto" class="min-h-screen flex items-center justify-center py-32 px-6">
        <div class="max-w-5xl mx-auto">
            <h2 class="text-4xl md:text-7xl font-bold leading-tight font-sans" id="manifesto-text">
                </h2>
        </div>
    </section>

    <section id="showcase" class="py-32 px-6">
        <div class="max-w-7xl mx-auto">
            <h3 class="text-sm font-bold tracking-[0.3em] text-duckYellow uppercase mb-16">
                // Nossos Projetos
            </h3>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                <div class="project-card group relative overflow-hidden rounded-2xl">
                    <div class="h-[500px] md:h-[600px] w-full overflow-hidden">
                        <img src="https://images.unsplash.com/photo-1600185365483-26d7a4cc7519?auto=format&fit=crop&q=80" alt="Identidade de Marca" class="object-cover w-full h-full transition-transform duration-700 ease-out group-hover:scale-105 group-hover:opacity-80">
                    </div>
                    <div class="absolute bottom-0 left-0 w-full p-8 translate-y-4 opacity-0 transition-all duration-500 ease-out group-hover:translate-y-0 group-hover:opacity-100 bg-gradient-to-t from-black/90 to-transparent">
                        <p class="text-duckYellow text-sm font-bold tracking-widest uppercase mb-2">Brand Identity</p>
                        <h4 class="text-4xl font-black text-white flex items-center justify-between">
                            Neon Kicks <span class="text-duckYellow text-3xl">↗</span>
                        </h4>
                    </div>
                </div>

                <div class="project-card group relative overflow-hidden rounded-2xl md:mt-32">
                    <div class="h-[500px] md:h-[600px] w-full overflow-hidden">
                        <img src="https://images.unsplash.com/photo-1550745165-9bc0b252726f?auto=format&fit=crop&q=80" alt="Experiência Web" class="object-cover w-full h-full transition-transform duration-700 ease-out group-hover:scale-105 group-hover:opacity-80">
                    </div>
                    <div class="absolute bottom-0 left-0 w-full p-8 translate-y-4 opacity-0 transition-all duration-500 ease-out group-hover:translate-y-0 group-hover:opacity-100 bg-gradient-to-t from-black/90 to-transparent">
                        <p class="text-duckYellow text-sm font-bold tracking-widest uppercase mb-2">Web Experience</p>
                        <h4 class="text-4xl font-black text-white flex items-center justify-between">
                            Cyber UI <span class="text-duckYellow text-3xl">↗</span>
                        </h4>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer id="contato" class="bg-black py-20 px-6 border-t border-white/10">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-start md:items-center">
            <div>
                <h2 class="text-5xl font-black text-white tracking-tighter uppercase mb-4 font-montserrat">
                    Ready to <span class="text-duckYellow">Quack?</span>
                </h2>
                <p class="text-gray-400 text-lg">Inicie seu projeto com o Studio Duck.</p>
            </div>
            <div class="mt-10 md:mt-0">
                <a href="https://wa.me/41995484601" target="_blank" rel="noopener noreferrer" class="inline-block bg-duckYellow text-black font-bold uppercase tracking-widest py-4 px-8 rounded-full hover:bg-white transition-colors hover:scale-105 duration-300 shadow-[0_0_15px_rgba(255,255,0,0.2)]">
                    Fale com a gente
                </a>
            </div>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            gsap.registerPlugin(ScrollTrigger);

            // --- LÓGICA DO CURSOR CUSTOMIZADO ---
            const cursor = document.getElementById('custom-cursor');
            
            document.addEventListener('mousemove', (e) => {
                cursor.style.left = e.clientX + 'px';
                cursor.style.top = e.clientY + 'px';
            });

            const interactables = document.querySelectorAll('a, .project-card, button');
            interactables.forEach(el => {
                el.addEventListener('mouseenter', () => cursor.classList.add('scale-[3]', 'bg-white'));
                el.addEventListener('mouseleave', () => cursor.classList.remove('scale-[3]', 'bg-white'));
            });

            // --- LÓGICA DE SMOOTH SCROLL PARA LINKS INTERNOS ---
            document.querySelectorAll('a[href^="#"]').forEach(anchor => {
                anchor.addEventListener('click', function (e) {
                    e.preventDefault();
                    const targetId = this.getAttribute('href');
                    const targetSection = document.querySelector(targetId);
                    
                    if (targetSection) {
                        const offsetTop = targetSection.getBoundingClientRect().top + window.scrollY - 80;
                        window.scrollTo({ top: offsetTop, behavior: 'smooth' });
                    }
                });
            });

            // --- ANIMAÇÕES GSAP ---
            
            // 1. Setup e injeção do Manifesto
            const manifestoSentence = "Não fazemos apenas design. Nós forjamos identidades que dominam o mercado e redefinem o padrão digital.";
            const manifestoContainer = document.getElementById("manifesto-text");
            
            manifestoSentence.split(" ").forEach(word => {
                const span = document.createElement("span");
                span.className = "manifesto-word inline-block mr-3 md:mr-5";
                span.innerText = word;
                manifestoContainer.appendChild(span);
            });

            // 2. Animação Hero (Entrada)
            gsap.from(".hero-text", {
                y: 50,
                opacity: 0,
                duration: 1.5,
                stagger: 0.2,
                ease: "power4.out",
                delay: 0.2
            });

            // 3. Animação Manifesto (Scroll Reveal)
            gsap.to(".manifesto-word", {
                opacity: 1,
                stagger: 0.1,
                scrollTrigger: {
                    trigger: "#manifesto",
                    start: "top 60%",
                    end: "bottom 80%",
                    scrub: 1,
                }
            });

            // 4. Animação Showcase (Entrada Parallax)
            gsap.from(".project-card", {
                y: 100,
                opacity: 0,
                duration: 1,
                stagger: 0.2,
                scrollTrigger: {
                    trigger: "#showcase",
                    start: "top 70%",
                    end: "bottom bottom",
                }
            });
        });
    </script>
</body>
</html>
